<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Smart Blur Stack</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    [data-blur-stack] {
      border-radius: 8px;
      background-size: cover;
      background-position: center;
    }
  </style>
</head>
<body>

  <!-- Example -->
  <div
    data-blur-stack="step-10_min-0_max-16_topToBottom_smooth"
    style="
      width: 500px;
      height: 500px;
      background-image: url('https://framerusercontent.com/images/OvoeUUoJieDxhdSVb3JYp89qeI.png');
    "
  ></div>

<script src="blur-stack.js">    </script>

</body>
</html>
